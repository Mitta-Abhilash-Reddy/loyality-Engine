# ── Database ──────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/loyalty_engine
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── App ───────────────────────────────────────────────────────────────────────
server.port=8080
spring.application.name=loyalty-engine

# ── JWT ───────────────────────────────────────────────────────────────────────
# Change this secret in production — must be at least 32 characters
jwt.secret=loyalty-engine-super-secret-key-change-in-prod-2024
jwt.expiration-ms=86400000

# ── Points Config ─────────────────────────────────────────────────────────────
loyalty.points.rate=10

churn.service.url=http://localhost:8001/score